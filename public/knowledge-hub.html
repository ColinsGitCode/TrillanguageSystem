<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Hub - Three LANS</title>
    <link rel="icon" type="image/svg+xml" href="/favicon-lan.svg" />
    <link rel="shortcut icon" href="/favicon-lan.svg" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="modern-card.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <style>
        body {
            background-color: #f8f9fa;
            background-image:
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.08) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(16, 185, 129, 0.06) 0px, transparent 50%);
            color: #1f2937;
        }
        .dashboard-container {
            padding: 24px;
            max-width: 1600px;
            margin: 0 auto;
        }
        .card-header h3 {
            font-family: 'Space Grotesk', sans-serif;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            font-size: 14px;
            color: #6b7280;
        }
    </style>
</head>
<body data-dashboard-page="knowledge-hub" data-testid="knowledge-hub-page">
    <div class="dashboard-container">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; border-bottom: 1px solid #e5e7eb; padding-bottom: 16px;">
            <div style="display: flex; align-items: center; gap: 16px;">
                <a href="/" style="color: #6b7280; text-decoration: none; display: flex; align-items: center; gap: 8px; font-family: 'JetBrains Mono'; font-size: 13px; transition: color 0.2s;">
                    <span style="font-size: 16px;">←</span> TERMINAL
                </a>
                <h1 style="font-family: 'Space Grotesk'; font-size: 24px; font-weight: 700; margin: 0; letter-spacing: -0.02em; color: #1f2937;" data-testid="knowledge-hub-title">
                    KNOWLEDGE HUB <span style="color: #3b82f6;">// EXPLORER</span>
                </h1>
                <nav class="dashboard-page-nav">
                    <a class="dashboard-page-link" href="/dashboard.html">Mission Control</a>
                    <a class="dashboard-page-link" href="/knowledge-ops.html">Knowledge OPS</a>
                    <a class="dashboard-page-link active" href="/knowledge-hub.html">Knowledge Hub</a>
                </nav>
            </div>
            <div style="display: flex; align-items: center; gap: 18px;">
                <div class="hud-ticker" id="lastUpdatedTime">--:--:--</div>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <div class="status-dot" style="width: 8px; height: 8px; background: #10b981; border-radius: 50%; box-shadow: 0 0 8px rgba(16, 185, 129, 0.5);"></div>
                    <span id="systemStatusText" style="font-family: 'JetBrains Mono'; font-size: 12px; color: #10b981;">SYSTEM ONLINE</span>
                </div>
            </div>
        </header>

        <section class="glass-panel kh-statsbar">
            <div class="kh-statsbar-title">知识库 · Knowledge Base</div>
            <div id="knowledgeHubCounts" class="knowledge-hub-counts" data-testid="knowledge-hub-counts">
                <span class="tag">terms 0</span>
            </div>
        </section>

        <section class="glass-panel kh-explorer" data-testid="knowledge-base-panel">
            <!-- LEFT: navigation / filters -->
            <aside class="kh-nav">
                <div class="kh-axis-toggle" id="khAxisToggle" data-testid="kh-axis-toggle">
                    <button class="kh-axis-btn active" type="button" data-axis="function">句式功能</button>
                    <button class="kh-axis-btn" type="button" data-axis="topic">主题领域</button>
                    <button class="kh-axis-btn" type="button" data-axis="all">全部</button>
                </div>

                <label class="ko-field kh-search">
                    <span>Search</span>
                    <input id="knowledgeBaseSearch" type="search" placeholder="phrase / 词头 / alias…" data-testid="knowledge-base-search" />
                </label>

                <div class="kh-filter-row">
                    <label class="ko-field">
                        <span>Lang</span>
                        <select id="knowledgeBaseLang">
                            <option value="all">all</option>
                            <option value="ja">ja</option>
                            <option value="en">en</option>
                            <option value="zh">zh</option>
                            <option value="mixed">mixed</option>
                        </select>
                    </label>
                    <label class="ko-field">
                        <span>Card</span>
                        <select id="knowledgeBaseCardType">
                            <option value="all">all</option>
                            <option value="trilingual">trilingual</option>
                            <option value="grammar_ja">grammar_ja</option>
                        </select>
                    </label>
                    <label class="ko-field">
                        <span>Sort</span>
                        <select id="knowledgeBaseSort">
                            <option value="recent">recent</option>
                            <option value="score">score</option>
                            <option value="phrase">phrase</option>
                        </select>
                    </label>
                </div>

                <div class="kh-nav-section">
                    <div class="kh-nav-title">语义分类</div>
                    <div id="knowledgeBaseCategories" class="knowledge-base-categories" data-testid="knowledge-base-categories"></div>
                </div>

                <details class="kh-nav-section kh-tags">
                    <summary class="kh-nav-title">标签 Tags</summary>
                    <div id="knowledgeBaseTags" class="knowledge-hub-counts" data-testid="knowledge-base-tags"></div>
                </details>

                <div class="kh-nav-section">
                    <div class="kh-nav-title">洞察 Insights</div>
                    <div id="khInsights" class="kh-insights" data-testid="kh-insights">
                        <button class="kh-insight-btn" type="button" data-insight="synonym">同义边界</button>
                        <button class="kh-insight-btn" type="button" data-insight="pattern">语法模式</button>
                        <button class="kh-insight-btn" type="button" data-insight="cluster">聚类</button>
                        <button class="kh-insight-btn" type="button" data-insight="issue">问题</button>
                    </div>
                </div>
            </aside>

            <!-- CENTER: list (browse terms OR insight aggregate) -->
            <div class="kh-list">
                <div class="kh-list-crumb" id="khListCrumb" data-testid="kh-list-crumb">词条 · Terms</div>

                <div id="khBrowsePane" class="kh-pane">
                    <div id="knowledgeBaseTermList" class="knowledge-jobs-list kh-scroll" data-testid="knowledge-base-term-list">
                        <div class="empty-hint">Loading terms…</div>
                    </div>
                    <div class="knowledge-base-pager" data-testid="knowledge-base-pager">
                        <button id="knowledgeBasePrev" class="ko-start-btn" type="button" disabled>← Prev</button>
                        <span id="knowledgeBasePageInfo" class="mono">0 - 0 / 0</span>
                        <button id="knowledgeBaseNext" class="ko-start-btn" type="button" disabled>Next →</button>
                    </div>
                </div>

                <div id="khInsightPane" class="kh-pane" hidden>
                    <div id="khInsightList" class="knowledge-jobs-list kh-scroll" data-testid="knowledge-hub-synonyms">
                        <div class="empty-hint">选择左侧「洞察」类型</div>
                    </div>
                </div>
            </div>

            <!-- RIGHT: relation inspector -->
            <div class="kh-inspector">
                <div class="kh-nav-title">Relation Inspector</div>
                <div id="knowledgeRelationInspector" class="knowledge-summary-body kh-scroll" data-testid="knowledge-relation-inspector">
                    <div class="empty-hint">点击词条 / 洞察项查看关系</div>
                </div>
            </div>
        </section>
    </div>

    <!-- Card preview modal: clicking a term embeds the main app's native card
         modal via /?card=<id>&embed=1 so the format matches the phrase list. -->
    <div id="khCardModal" class="kh-card-modal" data-testid="kh-card-modal"
         role="dialog" aria-modal="true" aria-label="卡片预览 Card preview">
        <div class="kh-card-dialog">
            <button id="khCardClose" class="kh-card-close" type="button" aria-label="关闭卡片预览">✕</button>
            <div id="khCardSpinner" class="kh-card-spinner" aria-hidden="true"><div class="kh-spin"></div></div>
            <iframe id="khCardFrame" class="kh-card-frame" title="card preview"></iframe>
        </div>
    </div>

    <script type="module" src="js/modules/dashboard.js"></script>
</body>
</html>
