services:
  viewer:
    build: .
    container_name: trilingual-viewer
    depends_on:
      - ocr
      - tts-en
      - tts-ja
    environment:
      - PORT=3010
      - RECORDS_PATH=/data/trilingual_records
      - RECORDS_TIMEZONE=${RECORDS_TIMEZONE:-Asia/Shanghai}
      - DB_PATH=/data/trilingual_records/trilingual_records.db
      - OCR_PROVIDER=tesseract
      - OCR_TESSERACT_ENDPOINT=http://ocr:8080/ocr
      - OCR_LANGS=eng+jpn+chi_sim
      - OCR_TIMEOUT_MS=20000
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-v4-flash}
      - DEEPSEEK_TIMEOUT_MS=${DEEPSEEK_TIMEOUT_MS:-120000}
      - DEEPSEEK_THINKING=${DEEPSEEK_THINKING:-disabled}
      - TTS_EN_ENDPOINT=http://tts-en:8000/v1/audio/speech
      - TTS_EN_TYPE=kokoro
      - TTS_EN_SPEED=1.0
      - TTS_EN_VOICE=af_bella
      - TTS_EN_MODEL=hexgrad/Kokoro-82M
      - HTML_RENDER_MODE=local
      - TTS_JA_ENDPOINT=${TTS_JA_ENDPOINT:-http://tts-ja:50021}
      - TTS_JA_TYPE=${TTS_JA_TYPE:-voicevox}
      - TTS_JA_SBV2_ENDPOINT=${TTS_JA_SBV2_ENDPOINT:-}
      - TTS_JA_SBV2_MODEL_ID=${TTS_JA_SBV2_MODEL_ID:-0}
      - TTS_JA_SBV2_MODEL_NAME=${TTS_JA_SBV2_MODEL_NAME:-}
      - TTS_JA_SBV2_SPEAKER_ID=${TTS_JA_SBV2_SPEAKER_ID:-0}
      - TTS_JA_SBV2_SPEAKER_NAME=${TTS_JA_SBV2_SPEAKER_NAME:-}
      - TTS_JA_SBV2_STYLE=${TTS_JA_SBV2_STYLE:-Neutral}
      - VOICEVOX_SPEAKER=${VOICEVOX_SPEAKER:-2}
    ports:
      - "3010:3010"
    volumes:
      - trilingual_records:/data/trilingual_records
      - .:/app
      - /app/node_modules # prevent overwriting container node_modules with host ones
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  ocr:
    build:
      context: ./ocr_service
    container_name: trilingual-ocr
    environment:
      - OCR_LANGS=eng+jpn+chi_sim
      - OCR_TIMEOUT_SEC=20
      - OCR_PSM=6
      - OCR_OEM=1
    restart: unless-stopped

  tts-en:
    image: dlaszlo/speech-service:cpu-latest
    container_name: trilingual-tts-en
    environment:
      - STT_MODEL_NAME=Systran/faster-distil-whisper-small.en
      - STT_COMPUTE_TYPE=int8
      - TTS_MODEL_NAME=hexgrad/Kokoro-82M
      - TTS_LANG_CODE=a
      - HF_HOME=/data/huggingface
    ports:
      - "8000:8000"
    volumes:
      - kokoro_cache:/data/huggingface
    restart: unless-stopped

  tts-ja:
    image: voicevox/voicevox_engine:cpu-latest
    container_name: trilingual-tts-ja
    # Apple Silicon 如拉取失败，可尝试指定 platform: linux/arm64
    ports:
      - "50021:50021"
    restart: unless-stopped

  tts-ja-sbv2:
    profiles: ["sbv2"]
    build:
      context: ./tts/style-bert-vits2
    container_name: trilingual-tts-ja-sbv2
    environment:
      - SBV2_DEVICE=${SBV2_DEVICE:-cpu}
      - SBV2_MODEL_ROOT=/models/model_assets
      - SBV2_MODEL_REPO=${SBV2_MODEL_REPO:-litagin/style_bert_vits2_jvnv}
      - SBV2_MODEL_NAME=${SBV2_MODEL_NAME:-jvnv-F1-jp}
      - SBV2_MODEL_FILE=${SBV2_MODEL_FILE:-jvnv-F1-jp/jvnv-F1-jp_e160_s14000.safetensors}
      - SBV2_CONFIG_FILE=${SBV2_CONFIG_FILE:-jvnv-F1-jp/config.json}
      - SBV2_STYLE_FILE=${SBV2_STYLE_FILE:-jvnv-F1-jp/style_vectors.npy}
      - SBV2_BERT_MODEL=${SBV2_BERT_MODEL:-ku-nlp/deberta-v2-large-japanese-char-wwm}
      - SBV2_BERT_CACHE_DIR=/models/bert
      - SBV2_ENABLE_OPENJTALK_WORKER=${SBV2_ENABLE_OPENJTALK_WORKER:-false}
      - SBV2_HOST=0.0.0.0
      - SBV2_PORT=5000
      - HF_HOME=/models/huggingface
    volumes:
      - sbv2_models:/models
    ports:
      - "${SBV2_HOST_PORT:-15000}:5000"
    restart: unless-stopped

volumes:
  kokoro_cache:
  sbv2_models:
  trilingual_records:
