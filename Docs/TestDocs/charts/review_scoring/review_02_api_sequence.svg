<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" style="background: rgb(248, 250, 252); font-family: &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, &quot;SimHei&quot;, sans-serif;"><defs><marker id="arrow" viewBox="0 -5 10 10" refX="9" refY="0" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,-5L10,0L0,5" fill="#64748b"></path></marker></defs><text x="48" y="62" font-size="42" font-weight="700" fill="#0f172a">评审 API 时序（UI -&gt; Server -&gt; DB）</text><text x="48" y="96" font-size="20" fill="#475569">每个卡片可独立评分，批次统一 finalize</text><text x="180" y="156" text-anchor="middle" font-size="26" font-weight="700" fill="#0f172a">UI (Modal)</text><line x1="180" y1="180" x2="180" y2="760" stroke="#cbd5e1" stroke-width="2"></line><text x="640" y="156" text-anchor="middle" font-size="26" font-weight="700" fill="#0f172a">Review APIs</text><line x1="640" y1="180" x2="640" y2="760" stroke="#cbd5e1" stroke-width="2"></line><text x="1120" y="156" text-anchor="middle" font-size="26" font-weight="700" fill="#0f172a">SQLite</text><line x1="1120" y1="180" x2="1120" y2="760" stroke="#cbd5e1" stroke-width="2"></line><line x1="200" y1="220" x2="620" y2="220" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"></line><text x="410" y="212" text-anchor="middle" font-size="18" fill="#475569">GET /api/review/campaigns/active</text><line x1="660" y1="280" x2="1100" y2="280" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"></line><text x="880" y="272" text-anchor="middle" font-size="18" fill="#475569">查询 review_campaigns + progress</text><line x1="200" y1="340" x2="620" y2="340" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"></line><text x="410" y="332" text-anchor="middle" font-size="18" fill="#475569">GET /api/review/generations/:id/examples</text><line x1="660" y1="400" x2="1100" y2="400" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"></line><text x="880" y="392" text-anchor="middle" font-size="18" fill="#475569">JOIN units/sources/reviews</text><line x1="200" y1="470" x2="620" y2="470" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"></line><text x="410" y="462" text-anchor="middle" font-size="18" fill="#475569">POST /api/review/examples/:id/reviews</text><line x1="660" y1="530" x2="1100" y2="530" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"></line><text x="880" y="522" text-anchor="middle" font-size="18" fill="#475569">UPSERT example_reviews + 回写聚合分</text><line x1="200" y1="600" x2="620" y2="600" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"></line><text x="410" y="592" text-anchor="middle" font-size="18" fill="#475569">POST /api/review/campaigns/:id/finalize</text><line x1="660" y1="660" x2="1100" y2="660" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"></line><text x="880" y="652" text-anchor="middle" font-size="18" fill="#475569">计算 eligibility + 更新 campaign 状态</text><rect x="108" y="770" width="1384" height="90" rx="14" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"></rect><text x="800" y="826" text-anchor="middle" font-size="24" font-weight="700" fill="#334155">关键约束：未完成评审默认不可 finalize；finalize 后才更新注入资格</text><text x="48" y="874" font-size="13" fill="#64748b">Source: public/js/modules/api.js + server.js</text></svg>