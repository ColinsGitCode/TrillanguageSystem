<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" style="background: rgb(248, 250, 252); font-family: &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, &quot;SimHei&quot;, sans-serif;"><text x="48" y="62" font-size="44" font-weight="700" fill="#0f172a">业界落地综述：AI Agent 可观测性四层架构</text><text x="48" y="98" font-size="20" fill="#475569">实践趋同：采集层 -&gt; 遥测层 -&gt; 评估层 -&gt; 运营层</text><rect x="120" y="630" width="1360" height="130" rx="14" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2.5"></rect><text x="160" y="706" font-size="34" font-weight="700" fill="#0f172a">L4 运营治理层：SLO / 告警 / 发布门禁 / 复盘</text><rect x="120" y="490" width="1360" height="120" rx="14" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5"></rect><text x="160" y="566" font-size="34" font-weight="700" fill="#14532d">L3 评估层：离线评测、在线抽检、人评校准、红队</text><rect x="120" y="350" width="1360" height="120" rx="14" fill="#dbeafe" stroke="#2563eb" stroke-width="2.5"></rect><text x="160" y="426" font-size="34" font-weight="700" fill="#1e3a8a">L2 遥测层：Traces / Metrics / Logs / Events</text><rect x="120" y="210" width="1360" height="120" rx="14" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2.5"></rect><text x="160" y="286" font-size="34" font-weight="700" fill="#4c1d95">L1 采集层：SDK、Middleware、DB Hook、Tool Hook</text><text x="48" y="872" font-size="13" fill="#64748b">Observed across OpenTelemetry ecosystem + Agent observability platforms</text></svg>