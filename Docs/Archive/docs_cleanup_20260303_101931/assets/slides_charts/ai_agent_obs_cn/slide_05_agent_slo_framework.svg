<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" style="background: rgb(248, 250, 252); font-family: &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, &quot;SimHei&quot;, sans-serif;"><text x="48" y="62" font-size="44" font-weight="700" fill="#0f172a">Agent SLI/SLO 设计框架（SRE 视角）</text><text x="48" y="98" font-size="20" fill="#475569">从单一准确率转向“质量-性能-成本-安全”四维治理</text><rect x="80" y="190" width="360" height="260" rx="16" fill="#dbeafe" stroke="#2563eb" stroke-width="2"></rect><text x="100" y="226" font-size="26" font-weight="700" fill="#0f172a">质量 SLI</text><text x="100" y="286" font-size="24" fill="#1e293b">- Task Success Rate</text><text x="100" y="332" font-size="24" fill="#1e293b">- Groundedness / Faithfulness</text><text x="100" y="378" font-size="24" fill="#1e293b">- Human-rated Quality</text><rect x="470" y="190" width="360" height="260" rx="16" fill="#dcfce7" stroke="#16a34a" stroke-width="2"></rect><text x="490" y="226" font-size="26" font-weight="700" fill="#0f172a">性能 SLI</text><text x="490" y="286" font-size="24" fill="#1e293b">- P95 End-to-End Latency</text><text x="490" y="332" font-size="24" fill="#1e293b">- Tool Call Error Rate</text><text x="490" y="378" font-size="24" fill="#1e293b">- Queue Wait Time</text><rect x="860" y="190" width="360" height="260" rx="16" fill="#fff7ed" stroke="#ea580c" stroke-width="2"></rect><text x="880" y="226" font-size="26" font-weight="700" fill="#0f172a">成本 SLI</text><text x="880" y="286" font-size="24" fill="#1e293b">- Token per Success</text><text x="880" y="332" font-size="24" fill="#1e293b">- Cost per Request</text><text x="880" y="378" font-size="24" fill="#1e293b">- Cache Hit Ratio</text><rect x="1250" y="190" width="280" height="260" rx="16" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2"></rect><text x="1270" y="226" font-size="26" font-weight="700" fill="#0f172a">安全 SLI</text><text x="1270" y="286" font-size="24" fill="#1e293b">- Policy Violations</text><text x="1270" y="332" font-size="24" fill="#1e293b">- Unsafe Output Rate</text><text x="1270" y="378" font-size="24" fill="#1e293b">- Red-team Findings</text><rect x="120" y="500" width="1360" height="270" rx="16" fill="#ffffff" stroke="#94a3b8" stroke-width="2"></rect><text x="140" y="536" font-size="26" font-weight="700" fill="#0f172a">SLO 门禁示例（可执行）</text><text x="160" y="570" font-size="26" fill="#334155">规则1：P95 Latency &lt;= 30s 且 Error Rate &lt;= 2%</text><text x="160" y="620" font-size="26" fill="#334155">规则2：Quality Score 不低于基线 -2 分，且人评通过率 &gt;= 85%</text><text x="160" y="670" font-size="26" fill="#334155">规则3：Token 增幅超过 25% 时，必须满足 gain_per_1k_tokens &gt;= 阈值</text><text x="160" y="720" font-size="26" fill="#334155">规则4：安全违规率超过阈值立即阻断发布</text><text x="48" y="872" font-size="13" fill="#64748b">Reference model: SRE SLI/SLO method adapted for AI agents</text></svg>