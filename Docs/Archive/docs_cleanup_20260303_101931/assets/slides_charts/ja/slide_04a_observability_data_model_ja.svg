<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" style="background: rgb(247, 249, 252);"><rect x="16" y="16" width="1248" height="688" rx="18" fill="#FFFFFF" stroke="#E2E8F0"></rect><text x="44" y="62" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="40" font-weight="800" fill="#1F2937">観測サブページA：データモデルと追跡関係</text><text x="44" y="92" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="18" fill="#5B6475">生成記録からfew-shot参照まで単一路で追跡</text><rect x="80" y="160" width="220" height="120" rx="14" fill="#E7F0FF" stroke="#2563EB" stroke-width="2"></rect><text x="98" y="192" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="20" font-weight="800" fill="#1D4ED8">生成記録</text><text x="98" y="220" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#1F2937">phrases / files</text><rect x="360" y="160" width="220" height="120" rx="14" fill="#F3E8FF" stroke="#9333EA" stroke-width="2"></rect><text x="378" y="192" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="20" font-weight="800" fill="#7E22CE">指標記録</text><text x="378" y="220" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#1F2937">tokens / quality</text><rect x="640" y="160" width="220" height="120" rx="14" fill="#E9F8EF" stroke="#16A34A" stroke-width="2"></rect><text x="658" y="192" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="20" font-weight="800" fill="#15803D">音声記録</text><text x="658" y="220" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#1F2937">audio tasks</text><rect x="80" y="340" width="220" height="120" rx="14" fill="#FFF4E8" stroke="#EA580C" stroke-width="2"></rect><text x="98" y="372" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="20" font-weight="800" fill="#C2410C">few-shot実験</text><text x="98" y="400" font