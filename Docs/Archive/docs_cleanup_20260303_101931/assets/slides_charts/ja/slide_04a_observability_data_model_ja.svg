ポイント</text><text x="928" y="220" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#1F2937">・request_id / generation_id で結線</text><text x="928" y="244" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#1F2937">・PromptとOutputを同時保存</text><text x="928" y="268" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#1F2937">・品質差分をラウンド比較可能</text><text x="928" y="292" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#1F2937">・Teacher参照の効果を再集計可能</text><text x="44" y="690" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="12" fill="#64748B">出典: DB schema + experiment tracking flow</text></svg>