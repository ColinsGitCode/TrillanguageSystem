<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" style="background: rgb(247, 249, 252);"><rect x="16" y="16" width="1248" height="688" rx="18" fill="#FFFFFF" stroke="#E2E8F0"></rect><text x="44" y="62" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="40" font-weight="800" fill="#1F2937">概念解説① Prompt Engineering</text><text x="44" y="92" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="18" fill="#5B6475">何を最適化するかを定義する設計層</text><rect x="80" y="150" width="340" height="190" rx="14" fill="#E7F0FF" stroke="#2563EB" stroke-width="2"></rect><text x="98" y="182" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="20" font-weight="800" fill="#1D4ED8">役割</text><text x="98" y="210" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#1F2937">・目的と評価軸を定義</text><text x="98" y="234" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#1F2937">・出力フォーマットを規定</text><text x="98" y="258" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#1F2937">・失敗パターンを制約化</text><rect x="470" y="150" width="340" height="190" rx="14" fill="#E9F8EF" stroke="#16A34A" stroke-width="2"></rect><text x="488" y="182" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="20" font-weight="800" fill="#15803D">主要成果物</text><text x="488" y="210" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#1F2937">・system指示</text><text x="488" y="234" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#1F2937">・品質ルーブリック</text><text x="488" y="258" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#1F2937">・評価手順 / 判定条件</text><rect x="860" y="150" width="340" height="190" rx="14" fill="#FFF4E8" stroke="#EA580C" stroke-width="2"></rect><text x="878" y="182" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="20" font-weight="800" fill="#C2410C">本プロジェクト適用</text><text x="878" y="210" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#1F2937">・三言語カード仕様</text><text x="878" y="234" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#1F2937">・日本語ふりがな規則</text><text x="878" y="258" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#1F2937">・INTEL指標定義</text><rect x="130" y="410" width="1020" height="220" rx="14" fill="#EEF2F7" stroke="#64748B" stroke-width="2"></rect><text x="148" y="442" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="20" font-weight="800" fill="#475569">判断基準（この層で確定）</text><text x="148" y="470" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#1F2937">品質のみでは採用しない：品質 + コスト + 安定性 + 統計有意性を同時評価</text><text x="148" y="494" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#1F2937">→ 以降の Code as Prompt / few-shot はこの基準を満たすための実装手段</text><defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#64748B"></path></marker></defs><line x1="420" y1="245" x2="470" y2="245" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"></line><line x1="810" y1="245" x2="860" y2="245" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"></line><line x1="640" y1="342" x2="640" y2="410" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"></line><text x="44" y="690" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="12" fill="#64748B">出典: prompt engineering role in evaluation and constraints</text></svg>