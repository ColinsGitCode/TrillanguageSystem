<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" style="background: rgb(247, 249, 252);"><rect x="16" y="16" width="1248" height="688" rx="18" fill="#FFFFFF" stroke="#E2E8F0"></rect><text x="44" y="62" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="40" font-weight="800" fill="#1F2937">システム構成：生成から可観測まで</text><text x="44" y="92" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="18" fill="#5B6475">実験再現を支える記録導線</text><rect x="70" y="180" width="250" height="120" rx="14" fill="#E7F0FF" stroke="#2563EB" stroke-width="2"></rect><text x="88" y="212" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="20" font-weight="800" fill="#1D4ED8">フロントエンド</text><text x="88" y="240" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#1F2937">カード生成UI</text><text x="88" y="264" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#1F2937">比較ビュー / 履歴</text><rect x="370" y="180" width="250" height="120" rx="14" fill="#E9F8EF" stroke="#16A34A" stroke-width="2"></rect><text x="388" y="212" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="20" font-weight="800" fill="#15803D">バックエンド</text><text x="388" y="240" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#1F2937">生成オーケストレーション</text><text x="388" y="264" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#1F2937">モデル切替・比較実行</text><rect x="670" y="180" width="250" height="120" rx="14" fill="#F3E8FF" stroke="#9333EA" stroke-width="2"></rect><text x="688" y="212" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="20" font-weight="800" fill="#7E22CE">Promptエンジン</text><text x="688" y="240" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#1F2937">テンプレート組立</text><text x="688" y="264" font-family="'