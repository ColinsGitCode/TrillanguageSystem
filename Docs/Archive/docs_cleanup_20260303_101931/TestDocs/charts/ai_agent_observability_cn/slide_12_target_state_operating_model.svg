<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" style="background: rgb(248, 250, 252); font-family: &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, &quot;SimHei&quot;, sans-serif;"><text x="48" y="62" font-size="44" font-weight="700" fill="#0f172a">目标态：Agent 可观测性运营闭环</text><text x="48" y="98" font-size="20" fill="#475569">可观测 -&gt; 可解释 -&gt; 可决策 -&gt; 可优化</text><g transform="translate(520,470)"><path d="M-98.885,304.338A320,320,0,1,1,98.885,304.338L80.344,247.275A260,260,0,1,0,-80.344,247.275Z" fill="#2563eb" opacity="0.16" stroke="#2563eb" stroke-width="2"></path><text x="0" y="-242" text-anchor="middle" font-size="24" font-weight="700" fill="#2563eb">可观测</text><path d="M-77.254,237.764A250,250,0,1,1,77.254,237.764L58.713,180.701A190,190,0,1,0,-58.713,180.701Z" fill="#16a34a" opacity="0.16" stroke="#16a34a" stroke-width="2"></path><text x="0" y="-172" text-anchor="middle" font-size="24" font-weight="700" fill="#16a34a">可解释</text><path d="M-55.623,171.19A180,180,0,1,1,55.623,171.19L37.082,114.127A120,120,0,1,0,-37.082,114.127Z" fill="#ea580c" opacity="0.16" stroke="#ea580c" stroke-width="2"></path><text x="0" y="-102" text-anchor="middle" font-size="24" font-weight="700" fill="#ea580c">可决策</text><path d="M-33.992,104.616A110,110,0,1,1,33.992,104.616L15.451,47.553A50,50,0,1,0,-15.451,47.553Z" fill="#7c3aed" opacity="0.16" stroke="#7c3aed" stroke-width="2"></path><text x="0" y="-32" text-anchor="middle" font-size="24" font-weight="700" fill="#7c3aed">可优化</text><circle r="36" fill="#0f172a"></circle><text x="0" y="8" text-anchor="middle" font-size="22" fill="#ffffff">AI</text></g><rect x="930" y="210" width="600" height="530" rx="16" fill="#ffffff" stroke="#94a3b8" stroke-width="2"></rect><text x="950" y="246" font-size="26" font-weight="700" fill="#0f172a">建议年度北极星指标</text><text x="965" y="298" font-size="30" fill="#334155">- P95 端到端延迟：&lt; 30s</text><text x="965" y="372" font-size="30" fill="#334155">- 请求成功率：&gt; 98%</text><text x="965" y="446" font-size="30" fill="#334155">- 质量评分下限：&gt;= 80</text><text x="965" y="520" font-size="30" fill="#334155">- 严重故障 MTTR：&lt; 15min</text><text x="965" y="594" font-size="30" fill="#334155">- 单位质量成本：季度环比下降</text><text x="965" y="668" font-size="30" fill="#334155">- 发布回滚率：持续下降</text><text x="48" y="872" font-size="13" fill="#64748b">Outcome: observability as an engineering control system</text></svg>