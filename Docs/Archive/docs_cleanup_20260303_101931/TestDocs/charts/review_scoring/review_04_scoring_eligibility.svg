<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" style="background: rgb(248, 250, 252); font-family: &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, &quot;SimHei&quot;, sans-serif;"><defs><marker id="arrow" viewBox="0 -5 10 10" refX="9" refY="0" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,-5L10,0L0,5" fill="#64748b"></path></marker></defs><text x="48" y="62" font-size="42" font-weight="700" fill="#0f172a">评分与资格判定规则</text><text x="48" y="96" font-size="20" fill="#475569">数值分 + 决策投票共同决定是否可注入</text><rect x="90" y="190" width="620" height="300" rx="14" fill="#dbeafe" stroke="#2563eb" stroke-width="2"></rect><text x="106" y="222" font-size="22" font-weight="700" fill="#0f172a">评分输入</text><text x="120" y="284" font-size="24" fill="#0f172a">原句质量 (1~5)</text><rect x="360" y="260" width="300" height="34" rx="8" fill="#e2e8f0"></rect><rect x="360" y="260" width="135" height="34" rx="8" fill="#2563eb"></rect><text x="675" y="284" font-size="20" fill="#475569">45%</text><text x="120" y="364" font-size="24" fill="#0f172a">翻译准确性 (1~5)</text><rect x="360" y="340" width="300" height="34" rx="8" fill="#e2e8f0"></rect><rect x="360" y="340" width="135" height="34" rx="8" fill="#16a34a"></rect><text x="675" y="364" font-size="20" fill="#475569">45%</text><text x="120" y="444" font-size="24" fill="#0f172a">TTS 可用性 (1~5)</text><rect x="360" y="420" width="300" height="34" rx="8" fill="#e2e8f0"></rect><rect x="360" y="420" width="30" height="34" rx="8" fill="#ea580c"></rect><text x="675" y="444" font-size="20" fill="#475569">10%</text><rect x="760" y="190" width="750" height="300" rx="14" fill="#dcfce7" stroke="#16a34a" stroke-width="2"></rect><text x="776" y="222" font-size="22" font-weight="700" fill="#0f172a">聚合与门限</text><text x="790" y="266" font-size="26" fill="#14532d">- overall = 0.45*sentence + 0.45*translation + 0.1*tts</text><text x="790" y="318" font-size="26" fill="#14532d">- minVotes &gt;= 1（默认）</text><text x="790" y="370" font-size="26" 