<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" style="background: rgb(248, 250, 252); font-family: &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, &quot;SimHei&quot;, sans-serif;"><defs><marker id="arrow" viewBox="0 -5 10 10" refX="9" refY="0" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,-5L10,0L0,5" fill="#64748b"></path></marker></defs><text x="48" y="62" font-size="42" font-weight="700" fill="#0f172a">学习卡片评分与评论：端到端流程</text><text x="48" y="96" font-size="20" fill="#475569">生成即入池，评审后再进入 few-shot 注入通道</text><rect x="70" y="190" width="250" height="92" rx="14" fill="#dbeafe" stroke="#2563eb" stroke-width="2"></rect><text x="195" y="226" text-anchor="middle" font-size="21" font-weight="700" fill="#0f172a">1. 生成卡片</text><text x="195" y="254" text-anchor="middle" font-size="21" font-weight="500" fill="#0f172a">POST /api/generate</text><line x1="320" y1="236" x2="370" y2="236" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"></line><rect x="370" y="190" width="270" height="92" rx="14" fill="#dcfce7" stroke="#16a34a" stroke-width="2"></rect><text x="505" y="226" text-anchor="middle" font-size="21" font-weight="700" fill="#0f172a">2. 解析例句</text><text x="505" y="254" text-anchor="middle" font-size="21" font-weight="500" fill="#0f172a">EN/JA + 中文释义</text><line x1="640" y1="236" x2="690" y2="236" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"></line><rect x="690" y="190" width="320" height="92" rx="14" fill="#fff7ed" stroke="#ea580c" stroke-width="2"></rect><text x="850" y="226" text-anchor="middle" font-size="21" font-weight="700" fill="#0f172a">3. 入库去重</text><text x="850" y="254" text-anchor="middle" font-size="21" font-weight="500" fill="#0f172a">example_units + sources</text><line x1="1010" y1="236" x2="1060" y2="236" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"></line><rect x="1060" y="190" width="250" height="92" rx="14" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2"></rect><text x="1185" y="226" text-anchor="middle" font-size="21" font-weight="700" fill="#0f172a">4. UI 人工评分</text><text x="1185" y="254" text-anchor="middle" font-size="21" font-weight="500" fill="#0f172a">原句/翻译/TTS</text><line x1="1310" y1="236" x2="1360" y2="236" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"></line><rect x="1360" y="190" width="180" height="92" rx="14" fill="#fee2e2" stroke="#dc2626" stroke-width="2"></rect><text x="1450" y="226" text-anchor="middle" font-size="21" font-weight="700" fill="#0f172a">5. 保存评论</text><text x="1450" y="254" text-anchor="middle" font-size="21" font-weight="500" fill="#0f172a">decision/comment</text><rect x="140" y="360" width="1320" height="300" rx="14" fill="#ffffff" stroke="#94a3b8" stroke-width="2"></rect><text x="156" y="392" font-size="22" font-weight="700" fill="#0f172a">统一处理并入池（Finalize）</text><text x="180" y="430" font-size="26" fill="#1e293b">A. 批次进度检查：未评完禁止 finalize（默认）。</text><text x="180" y="488" font-size="26" fill="#1e293b">B. 聚合评分：overall = 0.45*原句 + 0.45*翻译 + 0.1*TTS。</text><text x="180" y="546" font-size="26" fill="#1e293b">C. 资格判定：pending / approved / rejected。</text><text x="180" y="604" font-size="26" fill="#1e293b">D. few-shot 检索优先使用 approved 样本；可配置 reviewOnly。</text><line x1="1260" y1="282" x2="1260" y2="360" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"></line><text x="1260" y="313" text-anchor="middle" font-size="18" fill="#475569">批次完成后</text><text x="48" y="874" font-size="13" fill="#64748b">Source: server.js + exampleReviewService.js + goldenExamplesService.js</text></svg>