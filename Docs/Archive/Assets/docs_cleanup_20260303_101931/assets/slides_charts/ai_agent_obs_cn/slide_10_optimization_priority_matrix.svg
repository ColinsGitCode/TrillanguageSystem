<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" style="background: rgb(248, 250, 252); font-family: &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, &quot;SimHei&quot;, sans-serif;"><text x="48" y="62" font-size="44" font-weight="700" fill="#0f172a">可优化项总览：从“可见”到“可控”</text><text x="48" y="98" font-size="20" fill="#475569">优先把观测数据变成自动化动作</text><line x1="260" y1="720" x2="1450" y2="720" stroke="#334155"></line><line x1="260" y1="720" x2="260" y2="180" stroke="#334155"></line><text x="880" y="770" font-size="28" text-anchor="middle" fill="#0f172a">实施复杂度（低 -&gt; 高）</text><text transform="translate(150,460) rotate(-90)" font-size="28" text-anchor="middle" fill="#0f172a">业务影响（低 -&gt; 高）</text><circle cx="557.5" cy="180" r="36" fill="#2563eb" opacity="0.85"></circle><text x="607.5" y="190" font-size="24" fill="#0f172a">统一 Trace-ID</text><circle cx="855" cy="180" r="36" fill="#16a34a" opacity="0.85"></circle><text x="905" y="190" font-size="24" fill="#0f172a">SLO + 告警规则</text><circle cx="855" cy="315" r="36" fill="#ea580c" opacity="0.85"></circle><text x="905" y="325" font-size="24" fill="#0f172a">Prompt 版本门禁</text><circle cx="1152.5" cy="315" r="36" fill="#7c3aed" opacity="0.85"></circle><text x="1202.5" y="325" font-size="24" fill="#0f172a">自动回归评测</text><circle cx="1152.5" cy="180" r="36" fill="#dc2626" opacity="0.85"></circle><text x="1202.5" y="190" font-size="24" fill="#0f172a">故障自愈编排</text><text x="48" y="872" font-size="13" fill="#64748b">Prioritize high-impact / low-effort tasks first</text></svg>