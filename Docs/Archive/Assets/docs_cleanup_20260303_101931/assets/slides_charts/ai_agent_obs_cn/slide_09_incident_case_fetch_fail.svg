<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" style="background: rgb(248, 250, 252); font-family: &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, &quot;SimHei&quot;, sans-serif;"><text x="48" y="62" font-size="44" font-weight="700" fill="#0f172a">故障复盘样例：GEMINI fetch fail</text><text x="48" y="98" font-size="20" fill="#475569">问题链：3210不可用 + IPv6 解析漂移 + 网关队列阻塞</text><rect x="90" y="210" width="260" height="100" rx="16" fill="#fee2e2" stroke="#dc2626" stroke-width="2"></rect><text x="220" y="246" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">症状</text><text x="220" y="270" text-anchor="middle" font-size="24" font-weight="500" fill="#0f172a">/api/generate</text><text x="220" y="294" text-anchor="middle" font-size="24" font-weight="500" fill="#0f172a">fetch fail</text><line x1="350" y1="260" x2="400" y2="260" stroke="#64748b" stroke-width="2.4"></line><rect x="400" y="210" width="260" height="100" rx="16" fill="#fef3c7" stroke="#ca8a04" stroke-width="2"></rect><text x="530" y="246" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">诊断</text><text x="530" y="270" text-anchor="middle" font-size="24" font-weight="500" fill="#0f172a">18888 validate 正常</text><text x="530" y="294" text-anchor="middle" font-size="24" font-weight="500" fill="#0f172a">api/gemini 503</text><line x1="660" y1="260" x2="710" y2="260" stroke="#64748b" stroke-width="2.4"></line><rect x="710" y="210" width="260" height="100" rx="16" fill="#fff7ed" stroke="#ea580c" stroke-width="2"></rect><text x="840" y="246" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">根因</text><text x="840" y="270" text-anchor="middle" font-size="24" font-weight="500" fill="#0f172a">3210 未常驻</text><text x="840" y="294" text-anchor="middle" font-size="24" font-weight="500" fill="#0f172a">IPv6优先失败</text><line x1="970" y1="260" x2="1020" y2="260" stroke="#64748b" stroke-width="2.4"></line><rect x="1020" y="210" width="260" height="100" rx="16" fill="#dcfce7" stroke="#16a34a" stroke-width="2"></rect><text x="1150" y="246" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">修复</text><text x="1150" y="270" text-anchor="middle" font-size="24" font-weight="500" fill="#0f172a">launchd守护</text><text x="1150" y="294" text-anchor="middle" font-size="24" font-weight="500" fill="#0f172a">IPv4 fallback</text><line x1="1280" y1="260" x2="1330" y2="260" stroke="#64748b" stroke-width="2.4"></line><rect x="1330" y="210" width="220" height="100" rx="16" fill="#dbeafe" stroke="#2563eb" stroke-width="2"></rect><text x="1440" y="246" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">结果</text><text x="1440" y="270" text-anchor="middle" font-size="24" font-weight="500" fill="#0f172a">链路恢复</text><rect x="120" y="400" width="1360" height="350" rx="16" fill="#ffffff" stroke="#94a3b8" stroke-width="2"></rect><text x="140" y="436" font-size="26" font-weight="700" fill="#0f172a">复盘结论（可迁移）</text><text x="160" y="472" font-size="26" fill="#334155">1) 对 Agent 系统，"健康检查可用" 不等于 "链路可用"，必须覆盖真实调用路径。</text><text x="160" y="536" font-size="26" fill="#334155">2) 可观测性需要同时覆盖控制面（队列/熔断）和数据面（请求/响应/超时）。</text><text x="160" y="600" font-size="26" fill="#334155">3) 上游执行器必须守护化（launchd/systemd），否则会周期性回归同类故障。</text><text x="160" y="664" font-size="26" fill="#334155">4) 对 host gateway 域名解析需设置 IPv4 优先或降级策略，避免环境漂移。</text><text x="48" y="872" font-size="13" fill="#64748b">Case-driven observability improvement loop</text></svg>