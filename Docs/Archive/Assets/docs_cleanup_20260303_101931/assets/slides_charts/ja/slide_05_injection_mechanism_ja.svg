<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" style="background: rgb(247, 249, 252);"><rect x="16" y="16" width="1248" height="688" rx="18" fill="#FFFFFF" stroke="#E2E8F0"></rect><text x="44" y="62" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="40" font-weight="800" fill="#1F2937">few-shot注入メカニズム</text><text x="44" y="92" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="18" fill="#5B6475">検索・選別・予算制御・フォールバック</text><rect x="60" y="190" width="220" height="130" rx="14" fill="#EEF2F7" stroke="#64748B" stroke-width="2"></rect><text x="78" y="222" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="20" font-weight="800" fill="#475569">入力フレーズ</text><text x="78" y="250" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#1F2937">例: rollout</text><defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#64748B"></path></marker></defs><line x1="280" y1="255" x2="330" y2="255" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"></line><rect x="330" y="190" width="220" height="130" rx="14" fill="#E7F0FF" stroke="#2563EB" stroke-width="2"></rect><text x="348" y="222" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="20" font-weight="800" fill="#1D4ED8">類似検索</text><text x="348" y="250" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#1F2937">Teacher候補を取得</text><line x1="550" y1="255" x2="600" y2="255" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"></line><rect x="600" y="190" width="220" height="130" rx="14" fill="#E9F8EF" stroke="#16A34A" stroke-width="2"></rect><text x="618" y="222" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="20" font-weight="800" fill="#15803D">品質選別</text><text x="618" y="250" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#1F2937">下限スコア / 類似度</text><line x1="820" y1="255" x2="870" y2="255" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"></line><rect x="870" y="190" width="220" height="130" rx="14" fill="#F3E8FF" stroke="#9333EA" stroke-width="2"></rect><text x="888" y="222" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="20" font-weight="800" fill="#7E22CE">予算判定</text><text x="888" y="250" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#1F2937">token比率 0.18-0.25</text><rect x="180" y="400" width="920" height="210" rx="14" fill="#FFF4E8" stroke="#EA580C" stroke-width="2"></rect><text x="198" y="432" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="20" font-weight="800" fill="#C2410C">フォールバック経路</text><text x="198" y="460" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#1F2937">1) 例示数を削減  →  2) 例示本文を短縮  →  3) 注入停止してbaselineへ回帰</text><text x="198" y="484" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#1F2937">budget_exceeded_disable を観測指標として保存</text><line x1="980" y1="320" x2="640" y2="400" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"></line><text x="810" y="352" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="14" fill="#475569">超過時</text><text x="44" y="690" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="12" fill="#64748B">出典: goldenExamplesService + token budget logic</text></svg>