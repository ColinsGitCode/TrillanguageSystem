<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" style="background: rgb(247, 249, 252);"><rect x="16" y="16" width="1248" height="688" rx="18" fill="#FFFFFF" stroke="#E2E8F0"></rect><text x="44" y="62" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="40" font-weight="800" fill="#1F2937">ワンクリック再現パイプライン</text><text x="44" y="92" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="18" fill="#5B6475">Run -&gt; Aggregate -&gt; Visualize -&gt; Report</text><rect x="80" y="260" width="230" height="170" rx="14" fill="#EEF2F7" stroke="#64748B" stroke-width="2"></rect><text x="98" y="292" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="20" font-weight="800" fill="#475569">Step 1: 実験実行</text><text x="98" y="320" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#1F2937">ラウンド生成</text><defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#64748B"></path></marker></defs><line x1="310" y1="345" x2="380" y2="345" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"></line><rect x="380" y="260" width="230" height="170" rx="14" fill="#E7F0FF" stroke="#2563EB" stroke-width="2"></rect><text x="398" y="292" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="20" font-weight="800" fill="#1D4ED8">Step 2: 集計</text><text x="398" y="320" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#1F2937">KPI抽出</text><line x1="610" y1="345" x2="680" y2="345" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"></line><rect x="680" y="260" width="230" height="170" rx="14" fill="#E9F8EF" stroke="#16A34A" stroke-width="2"></rect><text x="698" y="292" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="20" font-weight="800" fill="#15803D">Step 3: 可視化</text><text x="698" y="320" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#1F2937">SVG生成</text><line x1="910" y1="345" x2="980" y2="345" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"></line><rect x="980" y="260" width="230" height="170" rx="14" fill="#F3E8FF" stroke="#9333EA" stroke-width="2"></rect><text x="998" y="292" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="20" font-weight="800" fill="#7E22CE">Step 4: 報告</text><text x="998" y="320" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#1F2937">レポート出力</text><rect x="160" y="500" width="960" height="120" rx="14" fill="#FFF4E8" stroke="#EA580C" stroke-width="2"></rect><text x="178" y="532" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="20" font-weight="800" fill="#C2410C">再現性の定義</text><text x="178" y="560" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#1F2937">同じ入力セット・同じ設定で、同じ統計サマリーと同じ結論が再取得できること</text><text x="44" y="690" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="12" fill="#64748B">出典: experiment scripts + reporting pipeline</text></svg>