<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" style="background: rgb(247, 249, 252);"><rect x="16" y="16" width="1248" height="688" rx="18" fill="#FFFFFF" stroke="#E2E8F0"></rect><text x="44" y="62" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="40" font-weight="800" fill="#1F2937">概念解説③ few-shot</text><text x="44" y="92" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="18" fill="#5B6475">高品質例示を予算内で注入する実行戦術</text><rect x="70" y="190" width="230" height="140" rx="14" fill="#E7F0FF" stroke="#2563EB" stroke-width="2"></rect><text x="88" y="222" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="20" font-weight="800" fill="#1D4ED8">候補取得</text><text x="88" y="250" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#1F2937">Teacherサンプル検索</text><defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#64748B"></path></marker></defs><line x1="300" y1="260" x2="340" y2="260" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"></line><rect x="340" y="190" width="230" height="140" rx="14" fill="#E9F8EF" stroke="#16A34A" stroke-width="2"></rect><text x="358" y="222" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="20" font-weight="800" fill="#15803D">品質選別</text><text x="358" y="250" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#1F2937">スコア下限 / 類似度</text><line x1="570" y1="260" x2="610" y2="260" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"></line><rect x="610" y="190" width="230" height="140" rx="14" fill="#F3E8FF" stroke="#9333EA" stroke-width="2"></rect><text x="628" y="222" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="20" font-weight="800" fill="#7E22CE">予算判定</text><text x="628" y="250" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#1F2937">context比率 18-25%</text><line x1="840" y1="260" x2="880" y2="260" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"></line><rect x="880" y="190" width="230" height="140" rx="14" fill="#FFF4E8" stroke="#EA580C" stroke-width="2"></rect><text x="898" y="222" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="20" font-weight="800" fill="#C2410C">注入/縮退</text><text x="898" y="250" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#1F2937">注入 or 短縮 or 無効化</text><rect x="90" y="390" width="510" height="220" rx="14" fill="#EEF2F7" stroke="#64748B" stroke-width="2"></rect><text x="108" y="422" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="20" font-weight="800" fill="#475569">期待効果</text><text x="108" y="450" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#1F2937">・翻訳の自然さ向上</text><text x="108" y="474" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#1F2937">・例句品質の一貫性向上</text><text x="108" y="498" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#1F2937">・ローカルLLMの弱点補完</text><rect x="680" y="390" width="510" height="220" rx="14" fill="#FEECEC" stroke="#DC2626" stroke-width="2"></rect><text x="698" y="422" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="20" font-weight="800" fill="#B91C1C">運用リスクと制御</text><text x="698" y="450" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#1F2937">・token増加 → 予算制御/ゲートで抑制</text><text x="698" y="474" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#1F2937">・過適合 → Teacher多様性と定期更新</text><text x="698" y="498" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#1F2937">・効果減衰 → ラウンド評価で再調整</text><text x="44" y="690" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="12" fill="#64748B">出典: few-shot runtime strategy and controls</text></svg>