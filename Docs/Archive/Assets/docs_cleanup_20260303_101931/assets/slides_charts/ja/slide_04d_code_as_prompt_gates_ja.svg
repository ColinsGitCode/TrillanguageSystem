<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" style="background: rgb(247, 249, 252);"><rect x="16" y="16" width="1248" height="688" rx="18" fill="#FFFFFF" stroke="#E2E8F0"></rect><text x="44" y="62" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="40" font-weight="800" fill="#1F2937">観測サブページD：リリースゲート判定</text><text x="44" y="92" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="18" fill="#5B6475">主観ではなく指標でPromptを出荷</text><rect x="440" y="150" width="400" height="110" rx="14" fill="#EEF2F7" stroke="#64748B" stroke-width="2"></rect><text x="458" y="182" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="20" font-weight="800" fill="#475569">候補Prompt</text><text x="458" y="210" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#1F2937">実験ラウンド結果を入力</text><rect x="390" y="310" width="500" height="160" rx="14" fill="#E7F0FF" stroke="#2563EB" stroke-width="2"></rect><text x="408" y="342" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="20" font-weight="800" fill="#1D4ED8">ゲート条件</text><text x="408" y="370" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#1F2937">① deltaQuality &gt; 0</text><text x="408" y="394" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#1F2937">② p-value &lt; 0.05</text><text x="408" y="418" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#1F2937">③ Gain &gt; 5.0  (例外: 高コスト時は +3品質を要求)</text><rect x="180" y="540" width="380" height="110" rx="14" fill="#E9F8EF" stroke="#16A34A" stroke-width="2"></rect><text x="198" y="572" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="20" font-weight="800" fill="#15803D">PASS</text><text x="198" y="600" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#1F2937">本番候補として採用</text><text x="198" y="624" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#1F2937">次ラウンドで継続監視</text><rect x="720" y="540" width="380" height="110" rx="14" fill="#FEECEC" stroke="#DC2626" stroke-width="2"></rect><text x="738" y="572" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="20" font-weight="800" fill="#B91C1C">FAIL</text><text x="738" y="600" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#1F2937">差分分析へ戻す</text><text x="738" y="624" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="16" fill="#1F2937">候補例や予算設定を再調整</text><defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#64748B"></path></marker></defs><line x1="640" y1="260" x2="640" y2="310" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"></line><line x1="560" y1="470" x2="370" y2="540" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"></line><text x="465" y="497" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="14" fill="#475569">条件を満たす</text><line x1="720" y1="470" x2="910" y2="540" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"></line><text x="815" y="497" text-anchor="middle" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="14" fill="#475569">条件未達</text><text x="44" y="690" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic',sans-serif" font-size="12" fill="#64748B">出典: release policy / experiment gate criteria</text></svg>