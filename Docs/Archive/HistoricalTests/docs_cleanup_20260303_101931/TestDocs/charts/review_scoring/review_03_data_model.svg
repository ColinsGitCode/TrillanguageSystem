<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" style="background: rgb(248, 250, 252); font-family: &quot;Microsoft YaHei&quot;, &quot;PingFang SC&quot;, &quot;SimHei&quot;, sans-serif;"><defs><marker id="arrow" viewBox="0 -5 10 10" refX="9" refY="0" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,-5L10,0L0,5" fill="#64748b"></path></marker></defs><text x="48" y="62" font-size="42" font-weight="700" fill="#0f172a">数据模型：评分、评论与注入资格</text><text x="48" y="96" font-size="20" fill="#475569">核心是 example_units 主表 + campaign/review 明细表</text><rect x="80" y="200" width="360" height="200" rx="14" fill="#dbeafe" stroke="#2563eb" stroke-width="2"></rect><text x="96" y="232" font-size="22" font-weight="700" fill="#0f172a">generations</text><text x="98" y="276" font-size="21" fill="#1e293b">- id, phrase, folder_name</text><text x="98" y="318" font-size="21" fill="#1e293b">- markdown_content</text><text x="98" y="360" font-size="21" fill="#1e293b">- llm_provider, llm_model</text><rect x="500" y="160" width="480" height="280" rx="14" fill="#dcfce7" stroke="#16a34a" stroke-width="2"></rect><text x="516" y="192" font-size="22" font-weight="700" fill="#0f172a">example_units (核心)</text><text x="518" y="236" font-size="21" fill="#1e293b">- dedupe_hash, lang, sentence_text, translation_text</text><text x="518" y="278" font-size="21" fill="#1e293b">- review_score_sentence / translation / tts / overall</text><text x="518" y="320" font-size="21" fill="#1e293b">- review_votes, review_comment_latest, eligibility</text><rect x="1040" y="200" width="460" height="200" rx="14" fill="#fff7ed" stroke="#ea580c" stroke-width="2"></rect><text x="1056" y="232" font-size="22" font-weight="700" fill="#0f172a">example_reviews</text><text x="1058" y="276" font-size="21" fill="#1e293b">- example_id, campaign_id, reviewer</text><text x="1058" y="318" font-size="21" fill="#1e293b">- score_sentence, score_translation, score_tts</text><text x="1058" y="360" font-size="21" fill="#1e293b">- decision, comment</text><rect x="240" y="500" width="420" height="200" rx="14" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2"></rect><text x="256" y="532" font-size="22" font-weight="700" fill="#0f172a">review_campaigns</text><text x="258" y="576" font-size="21" fill="#1e293b">- name, status, snapshot_at</text><text x="258" y="618" font-size="21" fill="#1e293b">- total/reviewed/approved/rejected</text><text x="258" y="660" font-size="21" fill="#1e293b">- finalized_at</text><rect x="740" y="500" width="430" height="200" rx="14" fill="#e0f2fe" stroke="#0891b2" stroke-width="2"></rect><text x="756" y="532" font-size="22" font-weight="700" fill="#0f172a">review_campaign_items</text><text x="758" y="576" font-size="21" fill="#1e293b">- campaign_id, example_id</text><text x="758" y="618" font-size="21" fill="#1e293b">- status(pending/reviewed)</text><text x="758" y="660" font-size="21" fill="#1e293b">- reviewed_at</text><line x1="440" y1="300" x2="500" y2="300" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"></line><text x="470" y="292" text-anchor="middle" font-size="18" fill="#475569">解析后入池</text><line x1="980" y1="300" x2="1040" y2="300" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"></line><text x="1010" y="292" text-anchor="middle" font-size="18" fill="#475569">评分明细</text><line x1="660" y1="600" x2="740" y2="600" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"></line><text x="700" y="592" text-anchor="middle" font-size="18" fill="#475569">批次映射</text><line x1="980" y1="440" x2="960" y2="500" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"></line><text x="970" y="462" text-anchor="middle" font-size="18" fill="#475569">聚合状态</text><line x1="300" y1="400" x2="300" y2="500" stroke="#64748b" stroke-width="2.4" marker-end="url(#arrow)"></line><text x="300" y="442" text-anchor="middle" font-size="18" fill="#475569">快照建批次</text><line x1="1180" y1="500" x2="1240" y2="400" stroke="#64748b" stroke-width="2.4" marker-end