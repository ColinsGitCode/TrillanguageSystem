/rect><text x="417" y="48" fill="#15803D" font-size="22" font-weight="700" text-anchor="middle" font-family="SimHei, &quot;Microsoft YaHei&quot;, sans-serif">Host</text><circle cx="34" cy="118" r="6" fill="#16A34A"></circle><text x="54" y="126" fill="#1F2937" font-size="24" font-weight="600" font-family="SimHei, &quot;Microsoft YaHei&quot;, sans-serif">仍在本机执行 Gemini CLI</text><circle cx="34" cy="178" r="6" fill="#16A34A"></circle><text x="54" y="186" fill="#1F2937" font-size="24" font-weight="600" font-family="SimHei, &quot;Microsoft YaHei&quot;, sans-serif">作为工程自带 host-side executor</text><circle cx="34" cy="238" r="6" fill="#16A34A"></circle><text x="54" y="246" fill="#1F2937" font-size="24" font-weight="600" font-family="SimHei, &quot;Microsoft YaHei&quot;, sans-serif">连接本地 Gemini CLI 与项目专属运行目录</text></g><g transform="translate(760,790)"><rect width="560" height="320" rx="24" fill="#FFFFFF" stroke="#EA580C" stroke-width="3" filter="url(#shadow)"></rect><rect x="0" y="0" width="560" height="84" rx="24" fill="#FFF7ED"></rect><rect x="0" y="60" width="560" height="24" fill="#FFF7ED"></rect><text x="30" y="52" fill="#C2410C" font-size="34" font-weight="700" font-family="SimHei, &quot;Microsoft YaHei&quot;, sans-serif">数据与审计层</text><rect x="382" y="20" width="150" height="42" rx="21" fill="#FFFFFF" stroke="#EA580C" stroke-width="2"></rect><text x="457" y="48" fill="#C2410C" font-size="22" font-weight="700" text-anchor="middle" font-family="SimHei, &quot;Microsoft YaHei&quot;, sans-serif">DB</text><circle cx="34" cy="118" r="6" fill="#EA580C"></circle><text x="54" y="126" fill="#1F2937" font-size="24" font-weight="600" font-family="SimHei, &quot;Microsoft YaHei&quot;, sans-serif">SQLite：generations / card_training_assets</text><circle cx="34" cy="178" r="6" fill="#EA580C"></circle><text x="54" y="186" fill="#1F2937" font-size="24" font-weight="600" font-family="SimHei, &quot;Microsoft YaHei&quot;, sans-serif">generation_jobs / generation_job_events</text><circle cx="34" cy="238" r="6" fill="#EA580C"></circle><text x="54" y="246" fill="#1F2937" font-size="24" font-weight="600" font-family="SimHei, &quot;Microsoft YaHei&quot;, sans-serif">Knowledge tables + TRAIN</text><text x="54" y="278" fill="#1F2937" font-size="24" font-weight="500" font-family="SimHei, &quot;Microsoft YaHei&quot;, sans-serif">assets + highlights</text></g><g transform="translate(1460,790)"><rect width="520" height="300" rx="24" fill="#FFFFFF" stroke="#2563EB" stroke-width="3" filter="url(#shadow)"></rect><rect x="0" y="0" width="520" height="84" rx="24" fill="#DBEAFE"></rect><rect x="0" y="60" width="520" height="24" fill="#DBEAFE"></rect><text x="30" y="52" fill="#1D4ED8" font-size="34" font-weight="700" font-family="SimHei, &quot;Microsoft YaHei&quot;, sans-serif">辅助服务层</text><rect x="308" y="20" width="184" height="42" rx="21" fill="#FFFFFF" stroke="#2563EB" stroke-width="2"></rect><text x="400" y="48" fill="#1D4ED8" font-size="22" font-weight="700" text-anchor="middle" font-family="SimHei, &quot;Microsoft YaHei&quot;, sans-serif">Sidecars</text><circle cx="34" cy="118" r="6" fill="#2563EB"></circle><text x="54" y="126" fill="#1F2937" font-size="24" font-weight="600" font-family="SimHei, &quot;Microsoft YaHei&quot;, sans-serif">OCR 容器：图像识别与清洗前置</text><circle cx="34" cy="178" r="6" fill="#2563EB"></circle><text x="54" y="186" fill="#1F2937" font-size="24" font-weight="600" font-family="SimHei, &quot;Microsoft YaHei&quot;, sans-serif">TTS EN / JA：例句音频生成</text><circle cx="34" cy="238" r="6" fill="#2563EB"></circle><text x="54" y="246" fill="#1F2937" font-size="24" font-weight="600" font-family="SimHei, &quot;Microsoft YaHei&quot;, sans-serif">都由 viewer 统一调度</text></g><line x1="620" y1="455" x2="760" y2="455" stroke="#475569" stroke-width="3.2" marker-end="url(#arrow)"></line><rect x="606" y="431" width="168" height="34" rx="17" fill="#FFFFFF" stroke="#CBD5E1"></rect><text x="690" y="454" fill="#334155" font-size="18" font-weight="700" font-family="SimHei, &quot;Microsoft YaHei&quot;, sans-serif" text-anchor="middle" letter-spacing="0">入队 / 读取</text><line x1="1320" y1="455" x2="1460" y2="455" stroke="#475569" stroke-width="3.2" marker-end="url(#arrow)"></line><rect x="1306" y="431" width="168" height="34" rx="17" fill="#FFFFFF" stroke="#CBD5E1"></rect><text x="1390" y="454" fill="#334155" font-size="18" font-weight="700" font-family="SimHei, &quot;Microsoft YaHei&quot;, sans-serif" text-anchor="middle" letter-spacing="0">LLM 调用</text><line x1="1980" y1="455" x2="2120" y2="455" stroke="#475569" stroke-width="3.2" marker-end="url(#arrow)"></line><rect x="1966" y="431" width="168" height="34" rx="17" fill="#FFFFFF" stroke="#CBD5E1"></rect><text x="2050" y="454" fill="#334155" font-size="18" font-weight="700" font-family="SimHei, &quot;Microsoft YaHei&quot;, sans-serif" text-anchor="middle" letter-spacing="0">转发</text><line x1="1040" y1="650" x2="1040" y2="790" stroke="#475569" stroke-width="3.2" marker-end="url(#arrow)"></line><rect x="956" y="696" width="168" height="34" rx="17" fill="#FFFFFF" stroke="#CBD5E1"></rect><text x="1040" y="719" fill="#334155" font-size="18" font-weight="700" font-family="SimHei, &quot;Microsoft YaHei&quot;, sans-serif" text-anchor="middle" letter-spacing="0">持久化</text><line x1="1600" y1="650" x2="1600" y2="790" stroke="#475569" stroke-width="3.2" marker-end="url(#arrow)"></line><rect x="1516" y="696" width="168" height="34" rx="17" fill="#FFFFFF" stroke="#CBD5E1"></rect><text x="1600" y="719" fill="#334155" font-size="18" font-weight="700" font-family="SimHei, &quot;Microsoft YaHei&quot;, sans-serif" text-anchor="middle" letter-spacing="0">协作</text><g transform="translate(1940,320)"><rect width="1120" height="250" rx="20" fill="#FFF7ED" stroke="#FB923C" stroke-width="2" filter="url(#shadow)"></rect><text x="24" y="38" fill="#C2410C" font-size="24" font-weight="700" font-family="SimHei, &quot;Microsoft YaHei&quot;, sans-serif">未完成项 01 · Gemini Auth 收口</text><text x="26" y="76" fill="#1F2937" font-size="20" font-weight="500" font-family="SimHei, &quot;Microsoft YaHei&quot;, sans-serif">• 当前调用链已切到项目内 proxy，但认证链还没有完全并到同一路径。</text><text x="26" y="114" fill="#1F2937" font-size="20" font-weight="500" font-family="SimHei, &quot;Microsoft YaHei&quot;, sans-serif">• 目标是让 auth status / start</text><text x="44" y="142" fill="#1F2937" font-size="20" font-weight="500" font-family="SimHei, &quot;Microsoft YaHei&quot;, sans-serif">/ submit / cancel 全部经由项目内</text><text x="44" y="170" fill="#1F2937" font-size="20" font-weight="500" font-family="SimHei, &quot;Microsoft YaHei&quot;, sans-serif">proxy 与 host executor。</text></g><g transform="translate(1940,610)"><rect width="1120" height="250" rx="20" fill="#FEF2F2" stroke="#F87171" stroke-width="2" filter="url(#shadow)"></rect><text x="24" y="38" fill="#B91C1C" font-size="24" font-weight="700" font-family="SimHei, &quot;Microsoft YaHei&quot;, sans-serif">未完成项 02 · 宿主机运行环境隔离</text><text x="26" y="76" fill="#1F2937" font-size="20" font-weight="500" font-family="SimHei, &quot;Microsoft YaHei&quot;, sans-serif">• Gemini CLI 仍受宿主机环境影响，这是当前最大外部变量。</text><text x="26" y="114" fill="#1F2937" font-size="20" font-weight="500" font-family="SimHei, &quot;Microsoft YaHei&quot;, sans-serif">• 需要继续隔离专属目录、白名单 env，并压缩 MCP</text><text x="44" y="142" fill="#1F2937" font-size="20" font-weight="500" font-family="SimHei, &quot;Microsoft YaHei&quot;, sans-serif">污染与非预期 fallback。</text></g><g transform="translate(1940,900)"><rect width="1120" height="250" rx="20" fill="#EEF2FF" stroke="#818CF8" stroke-width="2" filter="url(#shadow)"></rect><text x="24" y="38" fill="#4338CA" font-size="24" font-weight="700" font-family="SimHei, &quot;Microsoft YaHei&quot;, sans-serif">风险点 · 配额 / 模型可用性 / CLI 行为</text><text x="26" y="76" fill="#1F2937" font-size="20" font-weight="500" font-family="SimHei, &quot;Microsoft YaHei&quot;, sans-serif">• 共享队列和项目内 proxy 已稳定，但质量与时延仍受</text><text x="44" y="104" fill="#1F2937" font-size="20" font-weight="500" font-family="SimHei, &quot;Microsoft YaHei&quot;, sans-serif">Gemini 配额和模型状态影响。</text><text x="26" y="142" fill="#1F2937" font-size="20" font-weight="500" font-family="SimHei, &quot;Microsoft YaHei&quot;, sans-serif">• 现在的策略是：项目内清洗、校验、重试；不要静默降级。</text></g><g transform="translate(1940,1190)"><rect width="1120" height="320" rx="20" fill="#ECFDF5" stroke="#34D399" stroke-width="2" filter="url(#shadow)"></rect><text x="24" y="38" fill="#047857" font-size="24" font-weight="700" font-family="SimHei, &quot;Microsoft YaHei&quot;, sans-serif">下一阶段优先级</text><text x="26" y="76" fill="#1F2937" font-size="20" font-weight="500" font-family="SimHei, &quot;Microsoft YaHei&quot;, sans-serif">• P1：Gemini auth 全量收口到项目内</text><text x="44" y="104" fill="#1F2937" font-size="20" font-weight="500" font-family="SimHei, &quot;Microsoft YaHei&quot;, sans-serif">proxy。</text><text x="26" y="142" fill="#1F2937" font-size="20" font-weight="500" font-family="SimHei, &quot;Microsoft YaHei&quot;, sans-serif">• P2：继续隔离 host executor 的</text><text x="44" y="170" fill="#1F2937" font-size="20" font-weight="500" font-family="SimHei, &quot;Microsoft YaHei&quot;, sans-serif">Gemini CLI 运行环境。</text><text x="26" y="208" fill="#1F2937" font-size="20" font-weight="500" font-family="SimHei, &quot;Microsoft YaHei&quot;, sans-serif">• P3：增强共享队列控制能力（running cancel</text><text x="44" y="236" fill="#1F2937" font-size="20" font-weight="500" font-family="SimHei, &quot;Microsoft YaHei&quot;, sans-serif">/ priority / backoff）。</text></g><line x1="1760" y1="280" x2="1760" y2="1660" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="10 10"></line><text x="110" y="1618" fill="#0F172A" font-size="28" font-weight="700" font-family="SimHei, &quot;Microsoft YaHei&quot;, sans-serif" text-anchor="start" letter-spacing="0">当前判断：主链已稳定；剩余工作属于“架构收尾”，不是“主链路不可用”。</text><text x="110" y="1662" fill="#64748B" font-size="22" font-weight="500" font-family="SimHei, &quot;Microsoft YaHei&quot;, sans-serif" text-anchor="start" letter-spacing="0">数据来源：当前仓库实现 + SystemDevelopStatusDocs 状态文档（2026-03-26）</text></svg>